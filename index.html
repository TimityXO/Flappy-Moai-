<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flappy Moai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .game-container {
            position: relative;
            width: 360px;           /* Full width on all devices */
            height: 100vh;          /* Full height on all devices */
            background-image: url("/image.png");
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .start-btn {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 45px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background: #333;
            border: 5px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            box-shadow: 0 8px 0 #222;
            transition: all 0.2s ease;
        }

        .start-btn:hover {
            background: #555;
            transform: translateX(-50%) translateY(-6px);
            box-shadow: 0 14px 0 #222;
        }

        .start-btn:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 4px 0 #222;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-15px); }
        }

        /* Desktop: Keep original aspect ratio and add max size */
        @media (min-width: 800px) {
            .game-container {
                width: 800px;
                height: 1500px;
                border: 6px solid #333;
                border-radius: 8px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            }
            
            .start-btn {
                bottom: 40px;
                font-size: 24px;
                padding: 16px 40px;
                animation: bounce 0.9s ease-in-out infinite;
            }
        }

        /* Small phones adjustment */
        @media (max-width: 360px) {
            .start-btn {
                font-size: 24px;
                padding: 16px 40px;
                bottom: 12%;
            }
        }
    </style>
</head>

<body>

    <div class="game-container">
        <a href="game.html" class="start-btn">Start Game</a>
    </div>

</body>
</html>
