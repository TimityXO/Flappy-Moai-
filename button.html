<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Moai</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffff;
  }

  .game-container {
    position: relative;
    width: 400px;
    height: 700px;
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }

  .start-btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 30px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    background: #333;
    border: 3px solid #fff;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-decoration: none;

    animation: bounce 0.8s ease-in-out infinite;
  }

  .start-btn:hover {
    background: #555;
  }

  @keyframes bounce {
    0% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -15px); }
    100% { transform: translate(-50%, 0); }
  }
</style>

</head>

<body>

<div class="game-container">
  <!-- FIX: use <a> as the button -->
  <a href="index.html" class="start-btn">Start Game</a>
</div>

</body>
</html>
