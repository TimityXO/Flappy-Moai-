
<style>
*{margin:0;padding:0;box-sizing:border-box; color: rgb(250, 214, 11);}
#gameWrap{width:100%;max-width:900px;margin:0 auto;padding-top: 25px; position: relative;user-select:none;-webkit-user-select:none;min-height: 600px;align-items:center}
#gameCanvas{display:block;width:100%;image-rendering:pixelated;cursor:pointer;border:3px solid #1a1a1a}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
<div id="gameWrap">
  <canvas id="gameCanvas" width="900" height="600"></canvas>
  <div id="ui"></div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const wrap   = document.getElementById('gameWrap');
ctx.imageSmoothingEnabled=false;

const W=900,H=600;
/* ── Fill the entire screen ── */
function resize() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const ratio = W / H;           // 0.6 — portrait

  let cw, ch;
  // Fill height; if that makes it too wide, fill width instead
  if (sw / sh > ratio) {         // screen is wider than game ratio
    ch = sh; cw = ch * ratio;
  } else {                       // screen is narrower (normal portrait phone)
    cw = sw; ch = cw / ratio;
    // If calculated height exceeds screen, clamp to screen height
    if (ch > sh) { ch = sh; cw = ch * ratio; }
  }

  canvas.style.width  = Math.floor(cw) + 'px';
  canvas.style.height = Math.floor(ch) + 'px';
  wrap.style.width    = Math.floor(cw) + 'px';
  wrap.style.height   = Math.floor(ch) + 'px';
}
const PIPE_W=40,GAP=140,GRAVITY=0.38,FLAP=-6.5,SPEED=2.2,PIPE_INTERVAL=1600;

let state='idle';
let moai,pipes,score,frame,lastPipe,countdown,countdownTimer,bgX;
let bestScore=0;

function initGame(){
  moai={x:70,y:220,vy:0,angle:0,thrustFrame:0};
  pipes=[];
  score=0;
  frame=0;
  bgX=0;
  lastPipe=Date.now();
}

function startCountdown(){
  state='countdown';
  countdown=3;
  countdownTimer=Date.now();
  initGame();
}

function flap(){
  if(state==='idle'){startCountdown();return;}
  if(state==='countdown')return;
  if(state==='dead'){startCountdown();return;}
  if(state==='playing'){
    moai.vy=FLAP;
    moai.thrustFrame=8;
  }
}

canvas.addEventListener('click',flap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space')flap();});

function spawnPipe(){
  const top=60+Math.floor(Math.random()*(H-GAP-130));
  pipes.push({x:W,top,scored:false});
}

function update(){
  if(state==='countdown'){
    const elapsed=Date.now()-countdownTimer;
    const step=Math.floor(elapsed/800);
    if(step>=4){state='playing';}
    else countdown=3-step;
    return;
  }
  if(state!=='playing')return;

  frame++;
  bgX=(bgX-0.5+W)%W;

  moai.vy+=GRAVITY;
  moai.y+=moai.vy;
  moai.angle=Math.max(-25,Math.min(35,moai.vy*3));
  if(moai.thrustFrame>0)moai.thrustFrame--;

  if(Date.now()-lastPipe>PIPE_INTERVAL){spawnPipe();lastPipe=Date.now();}

  pipes.forEach(p=>p.x-=SPEED);
  pipes=pipes.filter(p=>p.x>-PIPE_W-4);

  pipes.forEach(p=>{
    if(!p.scored&&p.x+PIPE_W<moai.x){p.scored=true;score++;}
    if(checkCollision(moai,p)){die();}
  });

  if(moai.y<-10||moai.y>H-40){die();}
}

function checkCollision(m,p){
  const mx=m.x-18,my=m.y-18,mw=36,mh=38;
  const px=p.x+3,pw=PIPE_W-6;
  if(mx+mw<px||mx>px+pw)return false;
  if(my<p.top-4)return true;
  if(my+mh>p.top+GAP+4)return true;
  return false;
}

function die(){
  state='dead';
  if(score>bestScore)bestScore=score;
}

function drawPixelRect(x,y,w,h,color){
  ctx.fillStyle=color;
  ctx.fillRect(Math.round(x),Math.round(y),w,h);
}

function drawBackground(){
  ctx.fillStyle='#F5B800';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#E5A900';
  for(let i=0;i<8;i++){
    const bx=((i*90)-bgX*0.3+W)%W-20;
    drawBuilding(bx,H-160,30,100);
    drawBuilding(bx+40,H-130,25,80);
    drawBuilding(bx+70,H-150,35,110);
  }
  ctx.fillStyle='#D4941A';
  for(let i=0;i<7;i++){
    const bx=((i*100)-bgX*0.15+W)%W-25;
    drawBuilding(bx,H-100,40,60);
    drawBuilding(bx+55,H-85,28,45);
  }
}

function drawBuilding(x,y,w,h){
  ctx.fillRect(Math.round(x),Math.round(y),w,h);
  ctx.fillStyle=ctx.fillStyle;
  for(let r=0;r<Math.floor(h/14);r++){
    for(let c=0;c<Math.floor(w/10);c++){
      ctx.fillStyle='rgba(0,0,0,0.12)';
      ctx.fillRect(Math.round(x+c*10+2),Math.round(y+r*14+3),5,6);
      ctx.fillStyle=ctx.fillStyle;
    }
  }
}

function drawGround(){
  ctx.fillStyle='#555';
  ctx.fillRect(0,H-38,W,38);
  ctx.fillStyle='#444';
  ctx.fillRect(0,H-38,W,4);
  for(let i=0;i<12;i++){
    ctx.fillStyle='#F5B800';
    ctx.fillRect(Math.round(((i*32)-bgX*2+W*2)%(W+32)-8),H-30,20,8);
    ctx.fillStyle='#222';
    ctx.fillRect(Math.round(((i*32)-bgX*2+W*2)%(W+32)-6),H-28,16,4);
  }
  for(let i=0;i<5;i++){
    ctx.fillStyle='#3a3530';
    ctx.fillRect(Math.round(((i*72)-bgX*1.5+W*2)%(W+40))-4,H-50,16,16);
    ctx.fillStyle='#2a2520';
    ctx.fillRect(Math.round(((i*72)-bgX*1.5+W*2)%(W+40)),H-46,8,3);
  }
}

function drawPipe(p){
  const stripeH=10,sw=PIPE_W;
  const drawPipeBody=(x,y,h,flip)=>{
    if(h<=0)return;
    ctx.fillStyle='#4a4a5a';
    ctx.fillRect(Math.round(x),Math.round(y),sw,h);
    ctx.fillStyle='#3a3a4a';
    ctx.fillRect(Math.round(x),Math.round(y),3,h);
    ctx.fillStyle='#5a5a6a';
    ctx.fillRect(Math.round(x+sw-3),Math.round(y),3,h);
    for(let i=0;i<Math.ceil(h/stripeH);i++){
      const sy=flip?y+h-i*stripeH-stripeH:y+i*stripeH;
      const sh2=Math.min(stripeH,h-i*stripeH);
      if(sh2<=0)break;
      if(i%2===0){
        ctx.fillStyle='rgba(0,0,0,0.15)';
        ctx.fillRect(Math.round(x+3),Math.round(sy),sw-6,sh2);
      }
    }
    const capH=14,capX=x-4,capW=sw+8;
    const capY=flip?y+h-capH:y;
    ctx.fillStyle='#353545';
    ctx.fillRect(Math.round(capX),Math.round(capY),capW,capH);
    ctx.fillStyle='#252535';
    ctx.fillRect(Math.round(capX),Math.round(capY),capW,3);
    for(let s=0;s<Math.floor(capW/10);s++){
      ctx.fillStyle='#F5B800';
      ctx.fillRect(Math.round(capX+s*10+1),Math.round(capY+3),8,8);
      ctx.fillStyle='#1a1a1a';
      ctx.fillRect(Math.round(capX+s*10+2),Math.round(capY+4),6,4);
      ctx.fillStyle='rgba(255,255,255,0.1)';
      ctx.fillRect(Math.round(capX+s*10+2),Math.round(capY+4),3,2);
    }
  };
  drawPipeBody(p.x,0,p.top,false);
  drawPipeBody(p.x,p.top+GAP,H-p.top-GAP-38,true);
}

function drawMoai(x,y,angle,thrustFrame){
  const px=Math.round(x),py=Math.round(y);
  ctx.save();
  ctx.translate(px,py);
  ctx.rotate(angle*Math.PI/180);

  if(thrustFrame>0){
    const tf=thrustFrame;
    ctx.fillStyle='#00CFFF';
    for(let i=0;i<4;i++){
      ctx.fillStyle=i%2===0?'#00CFFF':'#0099CC';
      const tx=-22-i*5-Math.random()*4;
      const ty=-4+i*3;
      ctx.fillRect(tx,ty,6+i*2,4);
    }
    ctx.fillStyle='rgba(0,180,255,0.4)';
    ctx.fillRect(-38,-2,18,8);
    ctx.fillStyle='#00FFFF';
    ctx.fillRect(-30,-1,5,3);
    ctx.fillRect(-40,1,8,2);
  }

  const S=1;
  const col={
    top:'#8a8a9a',mid:'#727280',dark:'#3a3a48',light:'#a0a0b0',
    vdark:'#222230',shadow:'#1a1a28',eye:'#d0c8b8',pupil:'#1a1a18',
    hl:'#b8b8c8'
  };

  ctx.fillStyle=col.top;
  ctx.fillRect(-16*S,-26*S,32*S,6*S);
  ctx.fillStyle=col.hl;
  ctx.fillRect(-14*S,-26*S,28*S,2*S);
  ctx.fillStyle=col.mid;
  ctx.fillRect(-18*S,-20*S,36*S,38*S);
  ctx.fillStyle=col.dark;
  ctx.fillRect(-18*S,-20*S,3*S,38*S);
  ctx.fillStyle=col.light;
  ctx.fillRect(15*S,-20*S,3*S,38*S);
  ctx.fillStyle=col.mid;
  ctx.fillRect(-16*S,18*S,32*S,10*S);

  ctx.fillStyle=col.vdark;
  ctx.fillRect(-16*S,-8*S,32*S,6*S);
  ctx.fillStyle=col.shadow;
  ctx.fillRect(-16*S,-8*S,32*S,2*S);

  [[-9,-2],[5,-2]].forEach(([ex,ey])=>{
    ctx.fillStyle=col.shadow;
    ctx.fillRect(ex*S-1,(ey-1)*S,12*S,9*S);
    ctx.fillStyle=col.eye;
    ctx.fillRect(ex*S,ey*S,10*S,7*S);
    ctx.fillStyle=col.pupil;
    ctx.fillRect((ex+3)*S,(ey+2)*S,4*S,4*S);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillRect((ex+3)*S,(ey+2)*S,2*S,2*S);
  });

  ctx.fillStyle=col.shadow;
  ctx.fillRect(-6*S,6*S,12*S,10*S);
  ctx.fillStyle=col.mid;
  ctx.fillRect(-4*S,8*S,8*S,6*S);
  ctx.fillStyle=col.dark;
  ctx.fillRect(-4*S,6*S,8*S,3*S);
  ctx.fillStyle=col.shadow;
  ctx.fillRect(-3*S,14*S,3*S,3*S);
  ctx.fillRect(1*S,14*S,3*S,3*S);

  ctx.fillStyle=col.vdark;
  ctx.fillRect(-12*S,20*S,24*S,3*S);

  ctx.fillStyle=col.dark;
  ctx.fillRect(-18*S,-4*S,4*S,6*S);
  ctx.fillRect(14*S,-4*S,4*S,6*S);

  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(-6*S,-20*S,3*S,12*S);

  ctx.restore();
}

function drawHUD(){
  if(state!=='playing'&&state!=='dead')return;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(8,8,60,28);
  ctx.fillStyle='#F5B800';
  ctx.font='bold 11px monospace';
  ctx.fillText('SCORE',12,20);
  ctx.fillStyle='#fff';
  ctx.font='bold 14px monospace';
  ctx.fillText(score,12,34);
  if(bestScore>0){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(W-72,8,64,28);
    ctx.fillStyle='#F5B800';
    ctx.font='bold 11px monospace';
    ctx.fillText('BEST',W-68,20);
    ctx.fillStyle='#fff';
    ctx.font='bold 14px monospace';
    ctx.fillText(bestScore,W-68,34);
  }
}

function drawOverlay(){
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#F5B800';
    ctx.font='bold 26px monospace';
    ctx.textAlign='center';
    ctx.fillText('FLAPPY MOAI',W/2,160);
    ctx.fillStyle='#fff';
    ctx.font='bold 13px monospace';
    ctx.fillText('TAP TO START',W/2,200);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='12px monospace';
    ctx.fillText('or press SPACE',W/2,220);
    ctx.textAlign='left';
    return;
  }
  if(state==='countdown'){
    const elapsed=Date.now()-countdownTimer;
    const step=Math.floor(elapsed/800);
    const frac=(elapsed%800)/800;
    const scale=1+0.5*(1-frac);
    const alpha=1-frac*0.3;
    const label=step>=3?'FLAP':(3-step).toString();
    const color=step>=3?'#00FF88':'#F5B800';
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=color;
    ctx.font=`bold ${Math.round(56*scale)}px monospace`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(label,W/2,H/2);
    ctx.restore();
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
    return;
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(W/2-90,H/2-70,180,130);
    ctx.strokeStyle='#F5B800';
    ctx.lineWidth=2;
    ctx.strokeRect(W/2-90,H/2-70,180,130);
    ctx.fillStyle='#F5B800';
    ctx.font='bold 18px monospace';
    ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-40);
    ctx.fillStyle='#fff';
    ctx.font='14px monospace';
    ctx.fillText('Score: '+score,W/2,H/2-14);
    ctx.fillText('Best:  '+bestScore,W/2,H/2+10);
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.font='bold 12px monospace';
    ctx.fillText('TAP TO RETRY',W/2,H/2+45);
    ctx.textAlign='left';
  }
}

function draw(){
  drawBackground();
  pipes.forEach(drawPipe);
  drawGround();
  if(state!=='idle'){
    drawMoai(moai.x,moai.y,moai.angle,moai.thrustFrame);
  }else{
    drawMoai(W/2,H/2-20,0,0);
  }
  drawHUD();
  drawOverlay();
}

let last=0;
function loop(ts){
  if(ts-last>14){
    update();
    draw();
    last=ts;
  }
  requestAnimationFrame(loop);
}

initGame();
requestAnimationFrame(loop);
</script>
